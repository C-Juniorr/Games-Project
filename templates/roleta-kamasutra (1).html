<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roleta de Posições</title>
<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#2b0018,#5a0b2d,#8b1e3f);color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.box{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start}
canvas{background:#222;border-radius:50%;box-shadow:0 0 25px #000}
.side{width:300px;background:rgba(255,255,255,.08);padding:20px;border-radius:18px;backdrop-filter:blur(8px)}
textarea{width:100%;height:220px;background:#2c2230;color:#fff;border:none;border-radius:10px;padding:10px}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#d62d5e;color:#fff;font-weight:bold;cursor:pointer}
#result{margin-top:15px;font-size:22px;color:#ffd86b;font-weight:bold}
</style>
</head>
<body>
<div class="box">
<div style="position:relative">
<div style="position:absolute;left:50%;top:-12px;transform:translateX(-50%);width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;border-top:28px solid gold"></div>
<canvas id="wheel" width="420" height="420"></canvas>
</div>
<div class="side">
<h2>❤️ Roleta de Posições</h2>
<textarea id="list">Lótus
Borboleta
Tesoura
Ponte
Arco
Esfinge
Colher
Amazona
Amazona Reversa
Missionário
De Quatro
Flor de Lótus
Caranguejo
Estrela
Trono
Balanço
Concha
Águia
Tigre
Elefante</textarea>
<button onclick="loadNames()">Atualizar Lista</button>
<button id="spin">🎲 Girar</button>
<div id="result"></div>
</div>
</div>
<script>
const c=document.getElementById("wheel"),x=c.getContext("2d");
let names=[],rot=0,spin=false;
const cols=["#b11249","#d7265d","#ff6f61","#ffb703","#7b2cbf","#4361ee","#f72585","#e76f51","#ff006e","#8338ec"];
function loadNames(){names=document.getElementById("list").value.split("\n").map(v=>v.trim()).filter(Boolean);draw();}
function draw(){
const r=200,a=Math.PI*2/names.length;
x.clearRect(0,0,420,420);
x.save();x.translate(210,210);x.rotate(rot);
names.forEach((n,i)=>{
x.beginPath();x.moveTo(0,0);x.arc(0,0,r,i*a,(i+1)*a);x.closePath();
x.fillStyle=cols[i%cols.length];x.fill();
x.strokeStyle="#222";x.stroke();
x.save();x.rotate(i*a+a/2);x.fillStyle="#fff";x.font="bold 14px sans-serif";x.textAlign="right";x.fillText(n,r-12,5);x.restore();
});
x.restore();
x.beginPath();x.arc(210,210,20,0,Math.PI*2);x.fillStyle="#222";x.fill();x.strokeStyle="gold";x.stroke();
}
document.getElementById("spin").onclick=()=>{
if(spin)return;spin=true;
let start=rot,target=rot+(Math.PI*2)*(5+Math.random()*3)+Math.random()*Math.PI*2;
let t0=performance.now(),dur=4000;
(function anim(t){
let p=Math.min((t-t0)/dur,1),e=1-Math.pow(1-p,3);
rot=start+(target-start)*e;draw();
if(p<1)requestAnimationFrame(anim);else{
spin=false;rot%=Math.PI*2;
let ang=(Math.PI*1.5-rot+100*Math.PI)%(Math.PI*2);
let idx=Math.floor(ang/(Math.PI*2/names.length))%names.length;
document.getElementById("result").textContent="🔥 Posição sorteada: "+names[idx];
}}
)(t0);
requestAnimationFrame(anim);
};
loadNames();
</script>
</body>
</html>
