<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal de Jogos</title>

<style>

body{
    margin:0;
    background:#0b1020;
    color:white;
    font-family:Segoe UI;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    font-size:60px;
    margin-bottom:50px;
}

.menu{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    justify-content:center;
}

a{
    text-decoration:none;
}

.btn{
    width:250px;
    height:120px;
    border-radius:20px;
    background:#1f2d5c;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    color:white;
    transition:.3s;
    box-shadow:0 0 15px rgba(0,255,255,.2);
}

.btn:hover{
    transform:translateY(-8px);
    background:#30468e;
}

</style>

</head>
<body>

<div class="container">

<h1>🎮 Portal de Jogos</h1>

<div class="menu">

<a href="/ultimate">
<div class="btn">
Jogo da Velha
</div>
</a>

<a href="/reinos">
<div class="btn">
Reinos
</div>
</a>
<a href="/reigns-H.O.T.D">
<div class="btn">
Reinos Tematico A casa do Dragão
</div>
</a>
<a href="/football">
<div class="btn">
quiz futebol
</div>
</a>

</div>

</div>

</body>
</html>
