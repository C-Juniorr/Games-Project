<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Jogos CHFJ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --void:#07040f;
  --void-2:#120a28;
  --frame:#2a1c52;
  --violet:#8b6bf2;
  --cyan:#33e0d1;
  --amber:#f0b94a;
  --ember:#f2673f;
  --grass:#5fd992;
  --ink:#f3eeff;
  --ink-muted:#9c8fc4;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  min-height:100vh;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(139,107,242,.16), transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 90%, rgba(51,224,209,.10), transparent 60%),
    var(--void);
  color:var(--ink);
  font-family:'Manrope', sans-serif;
  overflow-x:hidden;
  position:relative;
}

/* subtle starfield */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,.5), transparent),
    radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,255,255,.35), transparent),
    radial-gradient(1px 1px at 40% 75%, rgba(255,255,255,.4), transparent),
    radial-gradient(1.5px 1.5px at 85% 60%, rgba(255,255,255,.3), transparent),
    radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,.3), transparent),
    radial-gradient(1.5px 1.5px at 10% 85%, rgba(255,255,255,.35), transparent);
  background-size:100% 100%;
  opacity:.6;
  z-index:0;
}

.stage{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:64px 24px 40px;
}

/* ambient rotating portal energy behind the hero */
.ambient{
  position:absolute;
  top:-220px;
  left:50%;
  width:900px;
  height:900px;
  transform:translateX(-50%);
  background:conic-gradient(from 0deg, transparent 0deg, rgba(139,107,242,.14) 60deg, transparent 140deg, rgba(51,224,209,.10) 220deg, transparent 300deg);
  filter:blur(60px);
  animation:spin 40s linear infinite;
  z-index:0;
  pointer-events:none;
}

@keyframes spin{ to{ transform:translateX(-50%) rotate(360deg); } }

.hero{
  position:relative;
  z-index:1;
  text-align:center;
  margin-bottom:56px;
  animation:fadeDown .8s ease both;
}

@keyframes fadeDown{
  from{ opacity:0; transform:translateY(-16px); }
  to{ opacity:1; transform:translateY(0); }
}

.eyebrow{
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  letter-spacing:.35em;
  text-transform:uppercase;
  color:var(--cyan);
  margin-bottom:18px;
}

.title{
  font-family:'Cinzel', serif;
  font-weight:700;
  font-size:clamp(48px, 9vw, 88px);
  letter-spacing:.06em;
  line-height:1;
  background:linear-gradient(180deg, #ffffff 10%, var(--violet) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  text-shadow:0 0 60px rgba(139,107,242,.35);
}

.title span{
  display:block;
  font-size:.42em;
  letter-spacing:.5em;
  font-weight:500;
  margin-top:10px;
  background:none;
  -webkit-text-fill-color:var(--ink-muted);
  color:var(--ink-muted);
}

.subtitle{
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  letter-spacing:.3em;
  color:var(--ink-muted);
  margin-top:18px;
}

.subtitle b{ color:var(--ink); font-weight:600; }

.gate-grid{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:36px;
  max-width:1040px;
  width:100%;
}

.gate{
  --accent:var(--violet);
  text-decoration:none;
  color:var(--ink);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  opacity:0;
  animation:riseIn .7s ease forwards;
  outline-offset:6px;
}

.gate:nth-child(1){ animation-delay:.15s; }
.gate:nth-child(2){ animation-delay:.30s; }
.gate:nth-child(3){ animation-delay:.45s; }
.gate:nth-child(4){ animation-delay:.60s; }

@keyframes riseIn{
  from{ opacity:0; transform:translateY(28px); }
  to{ opacity:1; transform:translateY(0); }
}

.gate-frame{
  position:relative;
  width:100%;
  max-width:230px;
  aspect-ratio:3/4;
  border-radius:50% 50% 14px 14px / 40% 40% 14px 14px;
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.25));
  border:1px solid var(--frame);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 24px 44px -26px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.02);
  transition:transform .45s cubic-bezier(.2,.8,.2,1), box-shadow .45s ease, border-color .45s ease;
}

.gate-glow{
  position:absolute;
  inset:-30%;
  background:conic-gradient(from 0deg, transparent, var(--accent), transparent 55%);
  filter:blur(26px);
  opacity:.28;
  animation:spin 10s linear infinite;
  transition:opacity .4s ease;
}

.rune{
  position:relative;
  z-index:2;
  width:56px;
  height:56px;
  color:var(--accent);
  filter:drop-shadow(0 0 10px var(--accent));
}

.gate-name{
  font-family:'Cinzel', serif;
  font-weight:600;
  font-size:18px;
  letter-spacing:.03em;
  text-align:center;
}

.gate-tag{
  font-family:'JetBrains Mono', monospace;
  font-size:11.5px;
  letter-spacing:.02em;
  color:var(--ink-muted);
  text-align:center;
  max-width:200px;
  line-height:1.5;
}

.gate:hover .gate-frame,
.gate:focus-visible .gate-frame{
  transform:translateY(-10px) scale(1.035);
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent), 0 0 46px -6px var(--accent), 0 30px 50px -26px rgba(0,0,0,.8);
}

.gate:hover .gate-glow,
.gate:focus-visible .gate-glow{
  opacity:.65;
  animation-duration:3.2s;
}

.gate:hover .rune,
.gate:focus-visible .rune{
  filter:drop-shadow(0 0 16px var(--accent));
}

.gate[data-game="ttt"]{ --accent:var(--cyan); }
.gate[data-game="reinos"]{ --accent:var(--amber); }
.gate[data-game="hotd"]{ --accent:var(--ember); }
.gate[data-game="futebol"]{ --accent:var(--grass); }

.foot{
  position:relative;
  z-index:1;
  margin-top:64px;
  font-family:'JetBrains Mono', monospace;
  font-size:11.5px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--ink-muted);
  opacity:.7;
}

.foot b{ color:var(--cyan); }

@media (max-width:600px){
  .stage{ padding:44px 18px 32px; }
  .hero{ margin-bottom:40px; }
  .gate-grid{ gap:26px; }
  .gate-frame{ max-width:190px; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
}
</style>
</head>
<body>

<div class="stage">
  <div class="ambient" aria-hidden="true"></div>

  <header class="hero">
    <p class="eyebrow">Escolha seu portal</p>
    <h1 class="title">PORTAL<span>Jogos</span></h1>
    <p class="subtitle">— <b>CHFJ</b> —</p>
  </header>

  <main class="gate-grid">

    <a class="gate" data-game="ttt" href="/ultimate">
      <div class="gate-frame">
        <span class="gate-glow" aria-hidden="true"></span>
        <svg class="rune" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="10" x2="22" y2="54"/>
          <line x1="42" y1="10" x2="42" y2="54"/>
          <line x1="10" y1="22" x2="54" y2="22"/>
          <line x1="10" y1="42" x2="54" y2="42"/>
          <line x1="13" y1="13" x2="18" y2="18"/>
          <line x1="18" y1="13" x2="13" y2="18"/>
          <circle cx="32" cy="32" r="6"/>
        </svg>
      </div>
      <span class="gate-name">Ultimate Tic Tac Toe</span>
      <span class="gate-tag">JOGO DA VELHA COMPLEXO</span>
    </a>

    <a class="gate" data-game="reinos" href="/reinos">
      <div class="gate-frame">
        <span class="gate-glow" aria-hidden="true"></span>
        <svg class="rune" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 44 L14 20 L24 33 L32 14 L40 33 L50 20 L54 44 Z"/>
          <line x1="10" y1="44" x2="54" y2="44"/>
          <line x1="12" y1="50" x2="52" y2="50"/>
        </svg>
      </div>
      <span class="gate-name">Reinos</span>
      <span class="gate-tag">Construa, conquiste e governe</span>
    </a>

    <a class="gate" data-game="hotd" href="/reigns-H.O.T.D">
      <div class="gate-frame">
        <span class="gate-glow" aria-hidden="true"></span>
        <svg class="rune" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M32 54C22 54 15 46 15 37C15 30 19 25 22 19C22 27 27 29 27 24C27 18 31 13 36 11C33 18 35 23 39 24C44 20 44 15 41 10C49 15 51 24 47 31C51 28 53 22 52 16C56 24 55 34 48 40C51 38 53 35 53 32C53 44 43 54 32 54Z"/>
        </svg>
      </div>
      <span class="gate-name">Reinos: A Casa do Dragão</span>
      <span class="gate-tag">Edição temática — fogo e sangue</span>
    </a>

    <a class="gate" data-game="futebol" href="/football">
      <div class="gate-frame">
        <span class="gate-glow" aria-hidden="true"></span>
        <svg class="rune" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="32" cy="32" r="22"/>
          <polygon points="32,20 40,26 37,35 27,35 24,26"/>
          <line x1="32" y1="20" x2="32" y2="10"/>
          <line x1="40" y1="26" x2="50" y2="20"/>
          <line x1="24" y1="26" x2="14" y2="20"/>
          <line x1="37" y1="35" x2="44" y2="46"/>
          <line x1="27" y1="35" x2="20" y2="46"/>
        </svg>
      </div>
      <span class="gate-name">Quiz Futebol</span>
      <span class="gate-tag">Teste seu conhecimento de bola</span>
    </a>

  </main>

  <p class="foot"><b>4</b> mundos abertos · Portal CHFJ</p>
</div>

</body>
</html>
