<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ultimate Tic Tac Toe</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI;
    color:white;
}

.container{
    width:1000px;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

h1{
    font-size:42px;
}

.info{
    color:#00ffd0;
}

button{
    background:#283b73;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
}

#board{

    width:900px;
    height:900px;

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    grid-template-rows:
    repeat(3,1fr);

    margin:auto;

    border:4px solid white;

    background:#101833;

    box-shadow:
    0 0 20px #243d8d;
}

.big-board{

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    grid-template-rows:
    repeat(3,1fr);

    border:2px solid rgba(255,255,255,.8);

    position:relative;
}

.big-board.active{
    background:
    rgba(0,255,208,.08);
}

.cell{

    border:1px solid rgba(
        255,255,255,.25
    );

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    font-size:55px;
}

.cell:hover{
    background:
    rgba(255,255,255,.05);
}

.x{

    color:#c89cff;

    text-shadow:
    0 0 8px #c89cff,
    0 0 15px #c89cff;
}

.o{

    color:#00ffd0;

    text-shadow:
    0 0 8px #00ffd0,
    0 0 15px #00ffd0;
}

.big-winner{

    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:150px;

    font-weight:bold;

    pointer-events:none;
}

.overlay{

    position:fixed;

    inset:0;

    background:
    rgba(0,0,0,.8);

    display:none;

    justify-content:center;

    align-items:center;

    font-size:90px;

    color:gold;
}

</style>
</head>
<body>

<div class="container">

<div class="topo">

<div>

<h1>Ultimate Tic Tac Toe</h1>
<div id="turno" class="info">
Turno: X
</div>

</div>

<button onclick="resetGame()">
Reiniciar
</button>

</div>

<div id="board"></div>

</div>

<div
class="overlay"
id="overlay">
</div>

<script>

const board =
document.getElementById("board");

const turnoText =
document.getElementById("turno");

const overlay =
document.getElementById("overlay");

let jogador = "X";

let tabuleiroObrigatorio =
null;

let vencedores =
Array(9).fill("");

let tabs =
Array.from(
{length:9},
()=>Array(9).fill("")
);

function criarTabuleiro(){

    board.innerHTML="";

    for(let b=0;b<9;b++){

        const big =
        document.createElement("div");

        big.className =
        "big-board";

        big.dataset.board=b;

        for(let c=0;c<9;c++){

            const cell =
            document.createElement("div");

            cell.className=
            "cell";

            cell.dataset.board=b;
            cell.dataset.cell=c;

            cell.onclick=
            jogar;

            big.appendChild(cell);
        }

        board.appendChild(big);
    }
}

function verificar(tab){

    const w = [
        [0,1,2],
        [3,4,5],
        [6,7,8],

        [0,3,6],
        [1,4,7],
        [2,5,8],

        [0,4,8],
        [2,4,6]
    ];

    for(let c of w){

        if(
        tab[c[0]] &&
        tab[c[0]]===tab[c[1]] &&
        tab[c[1]]===tab[c[2]]
        ){
            return tab[c[0]];
        }
    }

    return null;
}

function atualizarVisual(){

    document
    .querySelectorAll(".big-board")
    .forEach(el=>
        el.classList.remove(
        "active"
    ));

    if(
        tabuleiroObrigatorio
        !== null
    ){
        document
        .querySelector(
        `[data-board='${tabuleiroObrigatorio}']`
        )
        .classList.add(
        "active"
        );
    }

    turnoText.innerHTML=
    "Turno: "+jogador;
}

function jogar(){

    const b =
    Number(
    this.dataset.board
    );

    const c =
    Number(
    this.dataset.cell
    );

    if(
    tabuleiroObrigatorio !== null
    &&
    b !== tabuleiroObrigatorio
    )
    return;

    if(
    tabs[b][c]
    ) return;

    tabs[b][c]=jogador;

    this.innerHTML=jogador;

    this.classList.add(
    jogador.toLowerCase()
    );

   const v = verificar(tabs[b]);

    if(v && !vencedores[b]){

        vencedores[b]=v;

        const boardDiv =
        document.querySelector(
        `[data-board='${b}']`
        );

        const mark =
        document.createElement("div");

        mark.className =
        "big-winner " +
        v.toLowerCase();

        mark.innerHTML=v;

        boardDiv.appendChild(mark);
    }

        const final =
    verificar(vencedores);

    if(final){

        overlay.style.display=
        "flex";

        overlay.innerHTML=
        final+" VENCEU";

        return;
    }

    if(
    tabs[c].includes("")
    ){
        tabuleiroObrigatorio=
        c;
    }
    else{
        tabuleiroObrigatorio=
        null;
    }

    jogador =
    jogador==="X"
    ?"O":"X";

    atualizarVisual();
}

function resetGame(){

    jogador="X";

    vencedores=
    Array(9).fill("");

    tabs=
    Array.from(
    {length:9},
    ()=>Array(9).fill("")
    );

    tabuleiroObrigatorio=
    null;

    overlay.style.display=
    "none";

    criarTabuleiro();

    atualizarVisual();
}

criarTabuleiro();
atualizarVisual();

</script>
</body>
</html>
